{% extends "base.html" %}
{% block content %}
<div class="page-header">
    <h1>Modo Professor</h1>
    <p>Selecione um assunto e visualize o conteúdo em diferentes modos</p>
</div>

<div class="professor-selector">
    <select id="assuntoSelect" onchange="carregarAssunto()">
        <option value="">Selecione um assunto...</option>
    </select>
</div>

<div class="professor-modos" id="modosContainer" style="display:none;">
    <button class="modo-btn active" onclick="mudarModo('simples', this)">&#x1F4AC; Simples</button>
    <button class="modo-btn" onclick="mudarModo('juridico', this)">&#x2696; Jurídico</button>
    <button class="modo-btn" onclick="mudarModo('prova', this)">&#x270D; Prova</button>
</div>

<div id="professorContent">
    <div class="empty-state">
        <div class="icon">&#x1F393;</div>
        <h3>Selecione um assunto acima</h3>
        <p>Escolha um dos 35 temas de Direito das Obrigações para começar</p>
    </div>
</div>

<script>
let allTemas = [];

async function carregarTemas() {
    const r = await fetch('/api/resumos');
    allTemas = await r.json();
    const select = document.getElementById('assuntoSelect');
    allTemas.forEach(t => {
        const opt = document.createElement('option');
        opt.value = t.id;
        opt.textContent = t.titulo;
        select.appendChild(opt);
    });
}

function carregarAssunto() {
    const select = document.getElementById('assuntoSelect');
    const id = parseInt(select.value);
    const container = document.getElementById('professorContent');
    const modos = document.getElementById('modosContainer');

    if (!id) {
        container.innerHTML = `<div class="empty-state"><div class="icon">&#x1F393;</div><h3>Selecione um assunto acima</h3><p>Escolha um dos 35 temas de Direito das Obrigações para começar</p></div>`;
        modos.style.display = 'none';
        return;
    }

    modos.style.display = 'flex';
    const t = allTemas.find(x => x.id === id);
    if (!t) return;

    // Reset active modo
    document.querySelectorAll('.modo-btn').forEach(b => b.classList.remove('active'));
    document.querySelector('.modo-btn').classList.add('active');

    mostrarConteudo(t, 'simples');
}

function mostrarConteudo(t, modo) {
    const container = document.getElementById('professorContent');

    if (modo === 'simples') {
        container.innerHTML = `
            <h2 style="margin-bottom:20px;font-size:22px;">${t.titulo}</h2>
            <div class="professor-content active">
                <div class="card">
                    <h4>Conceito Simples</h4>
                    <p>${t.conceito_simples}</p>
                </div>
                <div class="card">
                    <h4>Exemplo Prático</h4>
                    <p>${t.exemplo}</p>
                </div>
            </div>
        `;
    } else if (modo === 'juridico') {
        container.innerHTML = `
            <h2 style="margin-bottom:20px;font-size:22px;">${t.titulo}</h2>
            <div class="professor-content active">
                <div class="card">
                    <h4>Conceito Técnico</h4>
                    <p>${t.conceito_tecnico}</p>
                </div>
                <div class="card">
                    <h4>Artigos do Código Civil</h4>
                    <p>${t.artigos || '—'}</p>
                </div>
            </div>
        `;
    } else if (modo === 'prova') {
        container.innerHTML = `
            <h2 style="margin-bottom:20px;font-size:22px;">${t.titulo}</h2>
            <div class="professor-content active">
                <div class="card">
                    <h4>Pegadinha de Prova</h4>
                    <p>${t.pegadinha}</p>
                </div>
                <div class="card">
                    <h4>Conceito Técnico</h4>
                    <p>${t.conceito_tecnico}</p>
                </div>
                <div class="card">
                    <h4>Exemplo Prático</h4>
                    <p>${t.exemplo}</p>
                </div>
            </div>
        `;
    }
}

function mudarModo(modo, btn) {
    document.querySelectorAll('.modo-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');

    const select = document.getElementById('assuntoSelect');
    const id = parseInt(select.value);
    const t = allTemas.find(x => x.id === id);
    if (t) mostrarConteudo(t, modo);
}

carregarTemas();
</script>
{% endblock %}
