{% extends "base.html" %}
{% block content %}
<div class="page-header">
    <h1>Resumos</h1>
    <p>35 temas completos de Direito das Obrigações com conceitos, exemplos e pegadinhas</p>
</div>

<div class="questoes-filters">
    <input type="text" id="searchInput" class="btn" placeholder="Buscar tema..." style="flex:1;max-width:300px;background:var(--bg-card);color:var(--text-primary);border:1px solid var(--border-glass);padding:10px 14px;border-radius:var(--radius-sm);font-family:inherit;font-size:14px;">
</div>

<div id="resumosContainer" class="modules-grid"></div>

<div id="resumoDetail" style="display:none;">
    <button onclick="voltarLista()" class="btn btn-sm" style="margin-bottom:16px;">&larr; Voltar</button>
    <div id="resumoContent"></div>
</div>

<script>
let allTemas = [];

fetch('/api/resumos')
    .then(r => r.json())
    .then(data => {
        allTemas = data;
        renderList(allTemas);
    });

function renderList(temas) {
    const c = document.getElementById('resumosContainer');
    c.innerHTML = '';
    document.getElementById('resumoDetail').style.display = 'none';
    c.style.display = 'grid';
    temas.forEach(t => {
        const div = document.createElement('div');
        div.className = 'module-card';
        div.style.cursor = 'pointer';
        div.innerHTML = `
            <div class="module-icon">&#x1F4DA;</div>
            <h3>${t.titulo}</h3>
            <p>${t.conceito_simples ? t.conceito_simples.substring(0, 100) + '...' : ''}</p>
            <span class="module-link">Ler resumo &rarr;</span>
        `;
        div.onclick = () => showDetail(t.id);
        c.appendChild(div);
    });
}

function showDetail(id) {
    const t = allTemas.find(x => x.id === id);
    if (!t) return;
    const c = document.getElementById('resumosContainer');
    c.style.display = 'none';
    const d = document.getElementById('resumoDetail');
    d.style.display = 'block';
    document.getElementById('resumoContent').innerHTML = `
        <div class="card" style="margin-bottom:16px;">
            <h2 style="margin-bottom:16px;font-size:22px;">${t.titulo}</h2>
            <div style="margin-bottom:16px;">
                <h4 style="color:var(--accent-blue);font-size:12px;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;">Conceito Simples</h4>
                <p style="font-size:14px;line-height:1.6;">${t.conceito_simples}</p>
            </div>
            <div style="margin-bottom:16px;">
                <h4 style="color:var(--accent-gold);font-size:12px;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;">Conceito Técnico</h4>
                <p style="font-size:14px;line-height:1.6;">${t.conceito_tecnico}</p>
            </div>
            <div style="margin-bottom:16px;">
                <h4 style="color:var(--accent-green);font-size:12px;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;">Exemplo Prático</h4>
                <p style="font-size:14px;line-height:1.6;">${t.exemplo}</p>
            </div>
            <div style="margin-bottom:16px;">
                <h4 style="color:var(--accent-red);font-size:12px;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;">Pegadinha de Prova</h4>
                <p style="font-size:14px;line-height:1.6;">${t.pegadinha}</p>
            </div>
            <div>
                <h4 style="color:var(--accent-purple);font-size:12px;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;">Artigos do CC</h4>
                <p style="font-size:14px;line-height:1.6;">${t.artigos || '—'}</p>
            </div>
        </div>
    `;
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

function voltarLista() {
    document.getElementById('resumoDetail').style.display = 'none';
    const c = document.getElementById('resumosContainer');
    c.style.display = 'grid';
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

document.getElementById('searchInput')?.addEventListener('input', function() {
    const q = this.value.toLowerCase();
    const filtered = allTemas.filter(t => t.titulo.toLowerCase().includes(q));
    renderList(filtered);
});
</script>
{% endblock %}
