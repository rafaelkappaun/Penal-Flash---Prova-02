{% extends "base.html" %}
{% block content %}
<div class="page-header">
    <h1>Simulado</h1>
    <p>Teste seus conhecimentos com questões aleatórias e timer</p>
</div>

<div id="simuladoConfig" class="simulado-config">
    <div class="card">
        <h2>Configurar Simulado</h2>
        <p style="color:var(--text-secondary);font-size:14px;margin-bottom:20px;">Escolha a quantidade de questões e o tempo disponível</p>
        <div class="btn-group" style="justify-content:center;margin-bottom:16px;">
            <button class="btn btn-sm" onclick="setQtd(20)" id="qtd20">20 questões</button>
            <button class="btn btn-sm btn-primary" onclick="setQtd(30)" id="qtd30">30 questões</button>
        </div>
        <div style="margin-bottom:20px;">
            <label>
                <input type="checkbox" id="timerToggle" onchange="toggleTimer()">
                Ativar timer (30 minutos)
            </label>
        </div>
        <button class="btn btn-gold" onclick="iniciarSimulado()" style="font-size:16px;padding:14px 32px;">&#x25B6; Iniciar Simulado</button>
    </div>
</div>

<div id="simuladoContainer" style="display:none;">
    <div class="timer" id="timerDisplay"></div>
    <div id="simuladoQuestoes"></div>
    <div style="text-align:center;margin-top:24px;">
        <button class="btn btn-gold" onclick="finalizarSimulado()">&#x1F4CA; Finalizar e Ver Resultado</button>
    </div>
</div>

<div id="simuladoRelatorio" style="display:none;" class="simulado-relatorio">
    <div class="relatorio-header">
        <div class="relatorio-nota" id="relatorioNota">0/0</div>
        <div class="relatorio-acertos" id="relatorioPercentual">0% de acertos</div>
        <div class="percentual-bar" style="max-width:300px;margin:16px auto;">
            <div class="percentual-fill" id="relatorioBarra" style="width:0%;background:linear-gradient(90deg,var(--accent-green),var(--accent-gold));"></div>
        </div>
    </div>
    <h3 style="margin-bottom:16px;font-size:16px;color:var(--text-secondary);">Temas com mais erros</h3>
    <div class="relatorio-detalhes" id="relatorioDetalhes"></div>
    <div style="text-align:center;margin-top:24px;">
        <button class="btn btn-primary" onclick="location.reload()">&#x1F504; Novo Simulado</button>
    </div>
</div>

<script src="{{ url_for('static', filename='js/simulado.js') }}"></script>
{% endblock %}
